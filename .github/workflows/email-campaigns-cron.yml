name: Scheduled Email Campaigns

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call campaign cron endpoint
        env:
          DDS_CRON_URL: ${{ secrets.DDS_CRON_URL }}
          DDS_CRON_SECRET: ${{ secrets.DDS_CRON_SECRET }}
        run: |
          if [ -z "$DDS_CRON_URL" ] || [ -z "$DDS_CRON_SECRET" ]; then
            echo "DDS_CRON_URL or DDS_CRON_SECRET is not configured."
            exit 0
          fi
          curl -fsS \
            -H "Authorization: Bearer $DDS_CRON_SECRET" \
            "$DDS_CRON_URL/api/cron/email-campaigns"
