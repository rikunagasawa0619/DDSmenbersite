<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DDS Members Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3efe4;
        color: #07111f;
        font-family: sans-serif;
      }
      .card {
        max-width: 520px;
        margin: 24px;
        padding: 32px;
        border-radius: 28px;
        border: 1px solid rgba(7, 17, 31, 0.08);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 22px 60px rgba(7, 17, 31, 0.08);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>オフラインです</h1>
      <p>通信が戻ると最新の予約情報や教材情報を読み込めます。</p>
    </main>
  </body>
</html>
